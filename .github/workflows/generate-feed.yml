name: Generate Trend Feeds

# Server-side trend fetching. Runs on a schedule using the API keys stored as
# GitHub Secrets, then commits the feed JSON so the Claude skill can read it
# with no keys of its own.

on:
  schedule:
    - cron: '0 6 * * 1'        # weekly, Monday 06:00 UTC
  workflow_dispatch:            # allow manual "Run workflow" from the Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate feeds
        env:
          # TikTok + Instagram both run through ScrapeCreators — one key (Secret).
          SCRAPECREATORS_API_KEY: ${{ secrets.SCRAPECREATORS_API_KEY }}
          HASHTAGS_TO_TRACK: ${{ vars.HASHTAGS_TO_TRACK }}
          TIKTOK_COUNTRIES: ${{ vars.TIKTOK_COUNTRIES }}
          TIKTOK_PERIOD: ${{ vars.TIKTOK_PERIOD }}
          TIKTOK_INDUSTRY: ${{ vars.TIKTOK_INDUSTRY }}
          IG_DATE_POSTED: ${{ vars.IG_DATE_POSTED }}
          # Reddit + YouTube are keyless — just what to track (Variables).
          REDDIT_SUBREDDITS: ${{ vars.REDDIT_SUBREDDITS }}
          REDDIT_QUERIES: ${{ vars.REDDIT_QUERIES }}
          REDDIT_PERIOD: ${{ vars.REDDIT_PERIOD }}
          YOUTUBE_QUERIES: ${{ vars.YOUTUBE_QUERIES }}
          YOUTUBE_RECENT_DAYS: ${{ vars.YOUTUBE_RECENT_DAYS }}
        run: python generate_feed.py

      - name: Commit feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-instagram.json feed-tiktok.json feed-reddit.json feed-youtube.json
          git diff --cached --quiet || git commit -m "chore: update trend feeds [skip ci]"
          git push
