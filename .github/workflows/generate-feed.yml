name: Generate Trend Feeds

# Server-side trend fetching. Runs on a schedule using the API keys stored as
# GitHub Secrets, then commits the feed JSON so the Claude skill can read it
# with no keys of its own.

on:
  schedule:
    - cron: '0 6 * * 1'        # weekly, Monday 06:00 UTC
  workflow_dispatch:            # allow manual "Run workflow" from the Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate feeds
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          ENSEMBLEDATA_API_TOKEN: ${{ secrets.ENSEMBLEDATA_API_TOKEN }}
          LAMATOK_API_KEY: ${{ secrets.LAMATOK_API_KEY }}
          HASHTAGS_TO_TRACK: ${{ vars.HASHTAGS_TO_TRACK }}
          TIKTOK_REGIONS: ${{ vars.TIKTOK_REGIONS }}
        run: python generate_feed.py

      - name: Commit feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-instagram.json feed-tiktok.json
          git diff --cached --quiet || git commit -m "chore: update trend feeds [skip ci]"
          git push
